syntax = "proto3";

package sgroups.v1;

import "buf/validate/validate.proto";
import "common/ip_transport.proto";
import "common/resource.proto";
import "google/api/field_behavior.proto";
import "protoc-gen-openapiv2/options/annotations.proto";

option go_package = "github.com/PRO-Robotech/sgroups-proto/pkg/api/sgroups/v1;sgroupsv1";

// Namespace: represents namespace resource
message Namespace {
  // Spec: resource specification
  message Spec {
    // DisplayName: resource display name
    string display_name = 1 [(buf.validate.field) = {
      string: {max_len: 63}
    }];
    // Comment: resource comment
    string comment = 2;
    // Description: resource description
    string description = 3;
  }
  // Metadata: namespace metadata
  common.Metadata metadata = 1 [(buf.validate.field) = {required: true}];
  // Spec: namespace specification
  Spec spec = 2 [(buf.validate.field) = {required: true}];
}

// AddressGroup: represents address group resource
message AddressGroup {
  // Spec: resource specification
  message Spec {
    // DisplayName: resource display name
    string display_name = 1 [(buf.validate.field) = {
      string: {max_len: 63}
    }];
    // Comment: resource comment
    string comment = 2;
    // Description: resource description
    string description = 3;
    // DefaultAction: default action for the address group
    common.Action default_action = 4 [(buf.validate.field) = {
      enum: {
        not_in: [0]
      }
    }];
    // Logs: enable logging
    bool logs = 5;
    // Trace: enable flow logging
    bool trace = 6;
  }
  // Metadata: address group metadata
  common.Metadata metadata = 1 [(buf.validate.field) = {required: true}];
  // Spec: address group specification
  Spec spec = 2 [(buf.validate.field) = {required: true}];
}

// Network: represents network resource
message Network {
  // Spec: resource specification
  message Spec {
    // DisplayName: resource display name
    string display_name = 1 [(buf.validate.field) = {
      string: {max_len: 63}
    }];
    // Comment: resource comment
    string comment = 2;
    // Description: resource description
    string description = 3;
    // CIDR: network CIDR
    string cidr = 4 [
      json_name = "CIDR",
      (buf.validate.field) = {
        string: {min_len: 1}
        cel: {
          expression: "this == this.trim()"
          message: "must not contain leading or trailing whitespace"
        }
        cel: {
          expression: "this.contains('/')"
          message: "must contain '/'"
        }
      }
    ];
  }
  // Metadata: network metadata
  common.Metadata metadata = 1 [(buf.validate.field) = {required: true}];
  // Spec: network specification
  Spec spec = 2 [(buf.validate.field) = {required: true}];
}

// Host: represents host resource
message Host {
  // Spec: resource specification
  message Spec {
    // MetaInfo: represents host meta information
    message MetaInfo {
      // HostName: host name
      string host_name = 1;
      // Os: host operating system
      string os = 2;
      // Platform: host platform
      string platform = 3;
      // PlatformFamily: host platform family
      string platform_family = 4;
      // PlatformVersion: host platform version
      string platform_version = 5;
      // KernelVersion: host kernel version
      string kernel_version = 6;
    }
    // DisplayName: resource display name
    string display_name = 1 [(buf.validate.field) = {
      string: {max_len: 63}
    }];
    // Comment: resource comment
    string comment = 2;
    // Description: resource description
    string description = 3;
    // IPs: list of IP addresses associated with the host
    common.IPs ips = 4 [
      json_name = "IPs",
      (google.api.field_behavior) = OUTPUT_ONLY,
      (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {read_only: true}
    ];
    // MetaInfo: host meta information
    MetaInfo meta_info = 5 [
      (google.api.field_behavior) = OUTPUT_ONLY,
      (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {read_only: true}
    ];
  }
  // Metadata: host metadata
  common.Metadata metadata = 1 [(buf.validate.field) = {required: true}];
  // Spec: host specification
  Spec spec = 2 [(buf.validate.field) = {required: true}];
}

// HostBinding: represents host binding resource
message HostBinding {
  // Spec: resource specification
  message Spec {
    // DisplayName: resource display name
    string display_name = 1 [(buf.validate.field) = {
      string: {max_len: 63}
    }];
    // Comment: resource comment
    string comment = 2;
    // Description: resource description
    string description = 3;
    // AddressGroup: reference to the address group
    common.ResourceIdentifier address_group = 4 [(buf.validate.field) = {required: true}];
    // Host: reference to the host
    common.ResourceIdentifier host = 5 [(buf.validate.field) = {required: true}];
  }
  // Metadata: host metadata
  common.Metadata metadata = 1 [(buf.validate.field) = {required: true}];
  // Spec: host specification
  Spec spec = 2 [(buf.validate.field) = {required: true}];
}

// Rule: represents rule resource
message Rule {
  // Spec: resource specification
  message Spec {
    // DisplayName: resource display name
    string display_name = 1 [(buf.validate.field) = {
      string: {max_len: 63}
    }];
    // Comment: resource comment
    string comment = 2;
    // Description: resource description
    string description = 3;
    // Action: rule action
    common.Action action = 4 [(buf.validate.field) = {
      enum: {
        not_in: [0]
      }
    }];
    // Session: session parameters
    common.Session session = 5;
    // Endpoints: local and remote endpoints
    common.Endpoints endpoints = 6;
    // Transport: network transport
    common.Transport transport = 7;
  }
  // Metadata: rule metadata
  common.Metadata metadata = 1 [(buf.validate.field) = {required: true}];
  // Spec: rule specification
  Spec spec = 2 [(buf.validate.field) = {required: true}];
}
