syntax = "proto3";

package sgroups.v1;

import "buf/validate/validate.proto";
import "common/resource.proto";
import "google/api/field_behavior.proto";
import "sgroups/v1/domains.proto";

option go_package = "github.com/PRO-Robotech/sgroups-proto/pkg/api/sgroups/v1;sgroupsv1";

// NamespaceReq: namespace requests
message NamespaceReq {
  // Selector: resource selector
  message Selector {
    // FieldSelector: resource field selector
    message FieldSelector {
      // Name: resource name
      string name = 1;
    }
    // FieldSelector: field selector
    FieldSelector field_selector = 1;
    // LabelSelector: label selector
    map<string, string> label_selector = 2;
  }
  // Upsert: request to upsert namespaces
  message Upsert {
    // Namespaces: list of namespaces
    repeated Namespace namespaces = 1 [
      (google.api.field_behavior) = REQUIRED,
      (buf.validate.field).repeated.min_items = 1
    ];
  }
  // Delete: request to delete namespaces
  message Delete {
    // MetadataScope: namespace metadata for scoping
    message MetadataScope {
      // Uid: unique identifier
      string uid = 1;
      // Name: resource name
      string name = 2;
    }
    // Namespace: namespace to delete
    message Namespace {
      // Metadata: metadata for scoping
      MetadataScope metadata = 1 [(buf.validate.field) = {
        required: true
        cel: {
          expression: "this.uid != '' || this.name != ''"
          message: "either uid must be set, or name must be set"
        }
      }];
    }
    // Namespaces: list of namespaces to delete
    repeated Namespace namespaces = 1 [
      (google.api.field_behavior) = REQUIRED,
      (buf.validate.field).repeated.min_items = 1
    ];
  }

  // List: request to list namespaces
  message List {
    // Selectors: list of selectors
    repeated Selector selectors = 1 [(buf.validate.field) = {required: true}];
  }

  // Watch: request to watch namespaces
  message Watch {
    // ResourceVersion: resource version for watch
    string resource_version = 1;
    // Selectors: list of selectors
    repeated Selector selectors = 2 [(buf.validate.field) = {required: true}];
  }
}

// NamespaceResp: namespace responses
message NamespaceResp {
  // Upsert: response for upsert namespaces
  message Upsert {
    // Namespaces: list of namespaces
    repeated Namespace namespaces = 1;
  }
  // List: response for list namespaces
  message List {
    // ResourceVersion: current global resource revision
    string resource_version = 1;
    // Namespaces: list of namespaces
    repeated Namespace namespaces = 2;
  }
  // Watch: response for watch namespaces
  message Watch {
    // Type: watch event type
    common.WatchEventType type = 1;
    // Namespaces: list of namespaces
    repeated Namespace namespaces = 2;
  }
}

// AddressGroupReq: address group requests
message AddressGroupReq {
  // Upsert: request to upsert address groups
  message Upsert {
    // AddressGroups: list of address groups
    repeated AddressGroup address_groups = 1 [
      json_name = "addressGroups",
      (google.api.field_behavior) = REQUIRED,
      (buf.validate.field).repeated.min_items = 1
    ];
  }
  // Delete: request to delete address groups
  message Delete {
    // AddressGroup: address group to delete
    message AddressGroup {
      // Metadata: metadata for scoping
      common.MetadataScope metadata = 1 [(buf.validate.field) = {
        required: true
        cel: {
          expression: "this.uid != '' || (this.name != '' && this.namespace != '')"
          message: "either uid must be set, or both name and namespace must be set"
        }
      }];
    }
    // AddressGroups: list of address groups to delete
    repeated AddressGroup address_groups = 1 [
      json_name = "addressGroups",
      (google.api.field_behavior) = REQUIRED,
      (buf.validate.field).repeated.min_items = 1
    ];
  }

  // List: request to list address groups
  message List {
    // Selectors: list of selectors
    repeated common.ResSelector selectors = 1 [(buf.validate.field) = {required: true}];
  }

  // Watch: request to watch address groups
  message Watch {
    // ResourceVersion: resource version for watch
    string resource_version = 1;
    // Selectors: list of selectors
    repeated common.ResSelector selectors = 2 [(buf.validate.field) = {required: true}];
  }
}

// AddressGroupResp: address group responses
message AddressGroupResp {
  // Upsert: response for upsert address groups
  message Upsert {
    // AddressGroups: list of address groups
    repeated AddressGroup address_groups = 1;
  }
  // List: response for list address groups
  message List {
    // AddressGroupExt: extended address group information
    message AddressGroupExt {
      // Metadata: address group metadata
      common.Metadata metadata = 1;
      // Spec: address group specification
      AddressGroup.Spec spec = 2;
      // Refs: list of resource references in the address group
      repeated common.ResourceRef refs = 3;
    }
    // ResourceVersion: current global resource revision
    string resource_version = 1;
    // AddressGroups: list of address groups
    repeated AddressGroupExt address_groups = 2;
  }
  // Watch: response for watch address groups
  message Watch {
    // Type: watch event type
    common.WatchEventType type = 1;
    // AddressGroups: list of address groups
    repeated AddressGroup address_groups = 2;
  }
}
