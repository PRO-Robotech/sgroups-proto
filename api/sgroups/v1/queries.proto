    string resource_version = 1;
    // Selectors: list of selectors
    repeated common.ResSelector selectors = 2 [(buf.validate.field) = {required: true}];
  }

  // UpdIPs: request to update IPs in hosts
  message UpdIPs {
    // Host: host to update IPs
    message Host {
      // Metadata: metadata for scoping
      common.MetadataScope metadata = 1 [(buf.validate.field) = {
        required: true
        cel: {
          expression: "this.uid != '' || (this.name != '' && this.namespace != '')"
          message: "either uid must be set, or both name and namespace must be set"
        }
      }];
      // Spec: host specification for IP update
      message Spec {
        // IPs: list of IPs to update in the host
        common.IPs ips = 1 [
          json_name = "IPs",
          (google.api.field_behavior) = REQUIRED
        ];
      }
      // Spec: host specification for IP update
      Spec spec = 2 [(buf.validate.field) = {required: true}];
    }
    // Hosts: list of hosts to update IPs
    repeated Host hosts = 1 [
      (google.api.field_behavior) = REQUIRED,
      (buf.validate.field).repeated.min_items = 1
    ];
  }

  // UpdMetaInfo: request to update host meta information
  message UpdMetaInfo {
    // HostInfo: host to update information
    message HostInfo {
      // Metadata: metadata for scoping
      common.MetadataScope metadata = 1 [(buf.validate.field) = {
        required: true
        cel: {
          expression: "this.uid != '' || (this.name != '' && this.namespace != '')"
          message: "either uid must be set, or both name and namespace must be set"
        }
      }];
      // Spec: host specification for information update
      message Spec {
        // MetaInfo: meta information to update in the host
        Host.Spec.MetaInfo meta_info = 1;
      }
      // Spec: host specification for information update
      Spec spec = 2 [(buf.validate.field) = {required: true}];
    }
    // Hosts: list of hosts to update information
    repeated HostInfo hosts = 1 [
      (google.api.field_behavior) = REQUIRED,
      (buf.validate.field).repeated.min_items = 1
    ];
  }
}

// HostResp: host responses
message HostResp {
  // HostExt: extended host information
  message HostExt {
