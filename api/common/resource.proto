syntax = "proto3";

package common;

import "buf/validate/validate.proto";
import "google/api/field_behavior.proto";
import "protoc-gen-openapiv2/options/annotations.proto";

option go_package = "github.com/PRO-Robotech/sgroups-proto/pkg/api/common;common";

// Metadata: common resource metadata
message Metadata {
  // UID: unique identifier. Use this for update requests; for create requests, leave it empty
  string uid = 1;
  // Name: resource name
  string name = 2 [(buf.validate.field) = {
    ignore: IGNORE_IF_ZERO_VALUE
    string: {
      min_len: 1
      max_len: 253
      pattern: "^[a-z0-9][a-z0-9.-]{0,252}$"
    }
  }];
  // Namespace: resource namespace
  string namespace = 3 [
    (google.api.field_behavior) = OPTIONAL,
    (buf.validate.field) = {
      ignore: IGNORE_IF_ZERO_VALUE
      string: {
        min_len: 1
        max_len: 63
        pattern: "^[a-z0-9](?:[a-z0-9-]{0,61}[a-z0-9])?$"
      }
    }
  ];
  // Labels: resource labels
  map<string, string> labels = 4;
  // Annotations: resource annotations
  map<string, string> annotations = 5;
  // CreationTimestamp: resource creation timestamp
  string creation_timestamp = 6 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = { read_only: true }
  ];
  // RevisionVersion: resource revision version
  string revision_version = 7 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = { read_only: true }
  ];
}

// MetadataScope: common resource metadata for scoping
message MetadataScope {
  // UID: unique identifier. Use this for update requests; for create requests, leave it empty
  string uid = 1;
  // Name: resource name
  string name = 2;
  // Namespace: resource namespace
  string namespace = 3;
}

// Spec: common resource specification
message Spec {
  // DisplayName: resource display name
  string display_name = 1 [(buf.validate.field) = {
    string: {
      min_len: 0
      max_len: 64
    }
  }];
  // Comment: resource comment
  string comment = 2;
  // Description: resource description
  string description = 3;
}

// ResSelector: resource selector
message ResSelector {
    // FieldSelector: resource field selector
    message FieldSelector {
        // ResourceRef: reference to a resource
        message ResourceRef {
            // name: reference resource name
            string name = 1;
            // namespace: reference resource namespace
            string namespace = 2;
            // res_type: reference resource type
            string res_type = 3;
        }
        // name: resource name
        string name = 1;
        // namespace: resource namespace
        string namespace = 2;
        // refs: resource references
        repeated ResourceRef refs = 3;
    }
    // field_selector: field selector
    FieldSelector field_selector = 1;
    // label_selector: label selector
    map<string, string> label_selector = 2;
}
