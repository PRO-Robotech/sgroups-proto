
name: Testing

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

  workflow_dispatch:

jobs:
  Tests:
    runs-on: ubuntu-latest

    steps:
      - name: git clone
        uses: actions/checkout@v3
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - run: go version

      - name: Run Linter
        run: make proto-lint
      - name: Run Tests
        run: make test
